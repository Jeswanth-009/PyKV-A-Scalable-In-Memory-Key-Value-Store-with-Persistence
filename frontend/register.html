<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Memory Forecaster — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: #f5b59e;
      background-image:
        radial-gradient(ellipse 70% 55% at 15% 5%,  #fbd4c2 0%, transparent 55%),
        radial-gradient(ellipse 55% 50% at 90% 95%, #e8937a 0%, transparent 50%),
        radial-gradient(ellipse 40% 40% at 60% 45%, rgba(255,200,185,.3) 0%, transparent 60%);
    }

    .outer {
      width: 100%;
      max-width: 560px;
      background: rgba(251, 214, 197, 0.42);
      border-radius: 26px;
      padding: 28px 24px;
      box-shadow:
        0 2px 0 rgba(255,255,255,.25) inset,
        0 16px 60px rgba(160, 55, 35, .14);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .card {
      background: rgba(255, 242, 236, 0.72);
      border-radius: 18px;
      padding: 38px 42px 42px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow:
        0 1px 0 rgba(255,255,255,.85) inset,
        0 8px 32px rgba(160, 55, 35, .08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* ── BRAND — inline layout as in screenshot ── */
    .brand {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 36px; flex-wrap: wrap;
    }
    .brand-icon {
      width: 50px; height: 50px;
      background: #350f1c;
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 18px rgba(53, 15, 28, .42);
    }
    .brand-icon svg { width: 20px; height: 20px; }
    .brand-text { flex: 1; }
    .brand-inline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.28rem; font-weight: 600;
      color: #350f1c; line-height: 1.1;
    }
    .brand-sub {
      display: inline;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .44rem; letter-spacing: .26em;
      color: #9a6e68; margin-left: 10px;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.85rem; font-weight: 600; font-style: italic;
      color: #350f1c; line-height: 1.04;
      margin-bottom: 8px; letter-spacing: -.01em;
    }
    .sub-text {
      font-size: .67rem; color: #7a4a50;
      margin-bottom: 32px; opacity: .88;
    }

    .msg {
      border-radius: 10px; padding: 11px 16px;
      font-size: .63rem; margin-bottom: 18px;
      display: none; line-height: 1.5;
    }
    .msg.err { background: rgba(180,45,45,.08); border: 1px solid rgba(180,45,45,.2); color: #7a2828; }
    .msg.suc { background: rgba(45,120,60,.07); border: 1px solid rgba(45,120,60,.2); color: #1e5c28; }

    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: .45rem;
      letter-spacing: .30em; color: #7a4a50;
      text-transform: uppercase; font-weight: 500; margin-bottom: 9px;
    }
    .field input {
      width: 100%;
      background: rgba(255, 230, 220, 0.65);
      border: 1.5px solid rgba(255, 255, 255, 0.55);
      border-radius: 12px; color: #350f1c;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .87rem; padding: 16px 18px;
      outline: none;
      transition: background .2s, border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      background: rgba(255, 220, 208, 0.85);
      border-color: rgba(150, 70, 70, .32);
      box-shadow: 0 0 0 3px rgba(150, 70, 70, .1);
    }
    .field input.invalid {
      border-color: rgba(180,45,45,.35);
      box-shadow: 0 0 0 3px rgba(180,45,45,.08);
    }
    .field input::placeholder { color: #c09898; }

    .btn {
      width: 100%; background: #350f1c; border: none;
      color: rgba(255, 215, 202, .92);
      font-family: 'IBM Plex Mono', monospace;
      font-size: .60rem; font-weight: 500;
      letter-spacing: .34em; padding: 18px;
      border-radius: 12px; cursor: pointer; margin-top: 6px;
      box-shadow: 0 1px 0 rgba(255,255,255,.08) inset, 0 6px 24px rgba(53,15,28,.38);
      transition: background .2s, transform .12s, box-shadow .2s;
    }
    .btn:hover { background: #250a14; transform: translateY(-1px); box-shadow: 0 10px 32px rgba(53,15,28,.44); }
    .btn:active { transform: translateY(0); }

    .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(150,75,65,.2); }
    .divider span { font-size: .54rem; color: #9a7060; letter-spacing: .14em; }

    .link-row { text-align: center; font-size: .66rem; color: #7a5050; }
    .link-row a {
      color: #350f1c; font-weight: 500;
      text-decoration: underline; text-underline-offset: 3px;
      text-decoration-color: rgba(53,15,28,.28);
      transition: text-decoration-color .2s;
    }
    .link-row a:hover { text-decoration-color: #350f1c; }
  </style>
</head>
<body>
  <div class="outer">
    <div class="card">

      <!-- Brand — inline as in screenshot -->
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3L21 10L12 21L3 10L12 3Z" stroke="rgba(255,205,188,.65)" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M3 10H21" stroke="rgba(255,205,188,.65)" stroke-width="1.5"/>
            <path d="M12 3L16.5 10L12 21L7.5 10L12 3Z" stroke="rgba(255,205,188,.3)" stroke-width="1" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-inline">Memory Forecaster</span>
          <span class="brand-sub">LRU &nbsp;·&nbsp; WEATHER &nbsp;·&nbsp; ENGINE</span>
        </div>
      </div>

      <h1>Create account</h1>
      <p class="sub-text">Join to explore the LRU weather engine</p>

      <div class="msg" id="msg"></div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a username" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password"/>
      </div>

      <button class="btn" onclick="handleRegister()">→ &nbsp;CREATE ACCOUNT</button>

      <div class="divider"><span>OR</span></div>
      <div class="link-row">Already have an account? <a href="http://127.0.0.1:8000/login">Sign in</a></div>
    </div>
  </div>

  <script>
    const USERS_KEY = 'mf_users', SESSION_KEY = 'mf_session';
    const BACKEND_ORIGIN = 'http://127.0.0.1:8000';
    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }
    function handleRegister() {
      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      document.querySelectorAll('input').forEach(i => i.classList.remove('invalid'));
      if (!username || username.length < 3) {
        document.getElementById('username').classList.add('invalid');
        showMsg('⚠ Username must be at least 3 characters.', 'err'); return;
      }
      if (!password || password.length < 6) {
        document.getElementById('password').classList.add('invalid');
        showMsg('⚠ Password must be at least 6 characters.', 'err'); return;
      }
      if (password !== confirm) {
        document.getElementById('confirm').classList.add('invalid');
        showMsg('⚠ Passwords do not match.', 'err'); return;
      }
      const users = JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
      if (!users['admin']) users['admin'] = { password: 'admin1234', role: 'ADMIN', avatar: 'A' };
      if (users[username]) { showMsg('⚠ Username already taken.', 'err'); return; }
      users[username] = { password, role: 'USER', avatar: username[0].toUpperCase() };
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
      showMsg('✓ Account created! Redirecting…', 'suc');
      setTimeout(() => window.location.href = BACKEND_ORIGIN + '/login', 1400);
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
    if (localStorage.getItem(SESSION_KEY)) window.location.href = BACKEND_ORIGIN + '/dashboard';
  </script>
</body>
</html>
